name: Tests

# Type-checks and runs the unit suite, including the deterministic scoring tests
# and the gold-set metric gate (docs/SCORING.md §13). The gate is armed once
# src/lib/pipeline/gold-set.fixtures.json is populated; until then it passes
# vacuously while the metric maths is still exercised.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Type-check and unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test
