name: Migrator image

on:
  push:
    branches: [main]
    paths:
      # On ne rebuild l'image migrator que si son périmètre change vraiment.
      - "Dockerfile.migrator"
      - "package.json"
      - "pnpm-lock.yaml"
      - "drizzle.config.ts"
      - "drizzle/**"
      - "src/db/**"
      - ".github/workflows/migrator-image.yml"
  workflow_dispatch:

concurrency:
  group: migrator-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  MIGRATOR_IMAGE: ghcr.io/xhelliom/unbunked-migrator

jobs:
  build-and-push-migrator:
    name: Build and push migrator image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login GHCR via le GITHUB_TOKEN du repo.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère automatiquement les tags: latest (main) + SHA immuable.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.MIGRATOR_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.migrator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
