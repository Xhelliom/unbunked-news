name: Seeder image

on:
  push:
    branches: [main]
    paths:
      # Rebuild only when the seeder scope changes.
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/db/**"
      - ".github/workflows/seeder-image.yml"
  workflow_dispatch:

concurrency:
  group: seeder-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  SEEDER_IMAGE: ghcr.io/xhelliom/unbunked-seeder

jobs:
  build-and-push-seeder:
    name: Build and push seeder image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Login GHCR with repository-scoped token.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish latest (default branch) and immutable SHA tags.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SEEDER_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push seeder
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: seeder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
