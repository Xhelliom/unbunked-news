# Requires metrics-server in the cluster to read pod CPU usage.
#
# DB connection math: maxReplicas * DATABASE_POOL_MAX must stay below Postgres
# max_connections. With the default pool of 10, 6 replicas need ~60 connections
# plus headroom. Front the DB with PgBouncer (or lower DATABASE_POOL_MAX)
# before raising maxReplicas.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: web
  namespace: unbunked
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: web
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
