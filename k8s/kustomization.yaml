apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: unbunked

resources:
  - namespace.yaml
  - network-policy.yaml
  - postgres.yaml
  - app.yaml
  - worker.yaml
  - hpa.yaml
  - ingress.yaml
  # Create k8s/secret.yaml from secret.example.yaml (never commit real secrets):
  # - secret.yaml

# The migration Job is applied on demand per release, not part of the base apply:
#   kubectl apply -f k8s/migrate-job.yaml
# The admin seed Job is also on-demand only:
#   kubectl apply -f k8s/seed-admin-job.yaml
