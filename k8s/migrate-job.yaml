# Run before rolling out a new app version that includes schema changes:
#   kubectl delete job migrate -n unbunked --ignore-not-found
#   kubectl apply -f k8s/migrate-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: unbunked
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        db-client: "true"
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          # Même image que l'app (app + migrate + seed). En prod, épingler par
          # digest pour éviter toute dérive.
          image: ghcr.io/xhelliom/unbunked-news:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          command: ["node", "dist/scripts/migrate.cjs"]
          envFrom:
            - secretRef:
                name: unbunked-secrets
