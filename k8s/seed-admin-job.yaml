# One-off admin seeding job (run on demand, not part of base kustomize apply):
#   kubectl delete job seed-admin -n unbunked --ignore-not-found
#   kubectl apply -f k8s/seed-admin-job.yaml
#   kubectl logs -f job/seed-admin -n unbunked
apiVersion: batch/v1
kind: Job
metadata:
  name: seed-admin
  namespace: unbunked
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed-admin
          # Uses latest tag for a simple on-demand admin bootstrap flow.
          image: ghcr.io/xhelliom/unbunked-seeder:latest
          envFrom:
            - secretRef:
                name: unbunked-secrets
          # Default bootstrap admin email.
          command:
            - pnpm
            - db:seed-admin
            - admin@unbunked.local
