# Job queue worker. Same image as the web Deployment (app.yaml) — only
# APP_ROLE=worker differs, so this process drains the durable job queue instead
# of serving HTTP traffic. It still runs `node server.js` (the Next server is
# up, which is why the health probes below work) but it is NOT behind the web
# Service/Ingress.
#
# Scaling: raise `replicas` to add job concurrency. The claim uses
# FOR UPDATE SKIP LOCKED, so multiple worker pods race for jobs without
# double-claiming — adding replicas is safe.
#
# DB connection math: each worker pod opens up to DATABASE_POOL_MAX connections,
# same as a web pod. Across the whole stack:
#   (web maxReplicas + worker replicas) * DATABASE_POOL_MAX < postgres max_connections.
# Front the DB with PgBouncer (or lower DATABASE_POOL_MAX) before scaling out.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: unbunked
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/xhelliom/unbunked-news:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: unbunked-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: APP_ROLE
              value: worker
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              # Chromium/puppeteer scraping fallback runs in this pod and OOMs
              # at 512Mi. No CPU limit on purpose: avoid throttling under load.
              memory: 1Gi
