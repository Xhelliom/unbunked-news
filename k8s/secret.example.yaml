# Template only — DO NOT put real secrets here.
# Copy to k8s/secret.yaml (gitignored) and fill in real values, or create it imperatively:
#
#   kubectl create secret generic unbunked-secrets -n unbunked \
#     --from-literal=POSTGRES_USER=unbunked \
#     --from-literal=POSTGRES_PASSWORD='<strong-password>' \
#     --from-literal=POSTGRES_DB=unbunked \
#     --from-literal=DATABASE_URL='postgresql://unbunked:<strong-password>@postgres:5432/unbunked'
#
apiVersion: v1
kind: Secret
metadata:
  name: unbunked-secrets
  namespace: unbunked
type: Opaque
stringData:
  POSTGRES_USER: unbunked
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: unbunked
  # Host is the Postgres Service name within the namespace.
  DATABASE_URL: postgresql://unbunked:change-me@postgres:5432/unbunked
  # Generate with: openssl rand -base64 32
  BETTER_AUTH_SECRET: change-me-with-a-32-byte-random-secret
  BETTER_AUTH_URL: https://unbunked.example.com
  ANTHROPIC_API_KEY: ""
