apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: unbunked
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        db-client: "true"
    spec:
      # The image runs as the non-root `nextjs` user (uid 1001, Dockerfile:42).
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          # Build & push the "runner" target, then set your registry/tag here.
          image: ghcr.io/xhelliom/unbunked-news:latest
          # Chromium's render fallback navigates attacker-controlled pages, so
          # drop all ambient capabilities and block privilege escalation. The
          # root FS stays writable (Next cache, /tmp, Chromium profile).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: unbunked-secrets
          env:
            - name: NODE_ENV
              value: production
            # Web pods serve HTTP only; the dedicated worker Deployment
            # (worker.yaml) drains the job queue. Separation of concerns.
            - name: APP_ROLE
              value: web
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              # HPA CPU utilization is computed against this request.
              cpu: 250m
              # Real steady-state usage is ~120Mi; 256Mi over-reserved and
              # blocked rollouts on memory-tight nodes (see #57).
              memory: 160Mi
            limits:
              # Chromium/puppeteer scraping fallback runs in this pod and OOMs
              # at 512Mi. No CPU limit on purpose: avoid throttling under load.
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: unbunked
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
