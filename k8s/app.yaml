apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: unbunked
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          # Build & push the "runner" target, then set your registry/tag here.
          image: ghcr.io/xhelliom/unbunked-news:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: unbunked-secrets
          env:
            - name: NODE_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: unbunked
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
