apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: unbunked
  annotations:
    # Requires cert-manager for automatic TLS. Adjust to your cluster.
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - unbunked.example.com
      secretName: web-tls
  rules:
    - host: unbunked.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
