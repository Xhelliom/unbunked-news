# Local stack. For day-to-day dev you can run just Postgres:
#   docker compose up -d db   &&   pnpm db:migrate   &&   pnpm dev
# Or run the full production-like stack: docker compose up --build
#
# Host ports are configurable via .env so this stack can coexist with other
# containers. Defaults avoid the generic 3000/5432/8080 ports:
#   DB_PORT (default 5434), APP_PORT (default 3030), ADMINER_PORT (default 8090).
# Inside the compose network services still talk over the standard ports.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: unbunked
      POSTGRES_PASSWORD: unbunked
      POSTGRES_DB: unbunked
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbunked -d unbunked"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: runner
    command: ["node", "dist/scripts/migrate.cjs"]
    environment:
      DATABASE_URL: postgresql://unbunked:unbunked@db:5432/unbunked
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    environment:
      NODE_ENV: production
      # hybrid runs the queue worker inside the web process, so this single
      # container both serves and drains jobs (the default; here explicitly).
      APP_ROLE: hybrid
      DATABASE_URL: postgresql://unbunked:unbunked@db:5432/unbunked
      BETTER_AUTH_URL: http://localhost:${APP_PORT:-3030}
    ports:
      - "${APP_PORT:-3030}:3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Lightweight DB browser — start with: docker compose --profile tools up adminer
  adminer:
    image: adminer:latest
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8090}:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles: ["tools"]

volumes:
  db-data:
